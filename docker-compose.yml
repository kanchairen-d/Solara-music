services:
  solara:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: solara
    restart: unless-stopped
    ports:
      - "3003:3001"
    environment:
      PORT: 3001
      # 可选：留空或删除 PASSWORD 即可关闭访问密码
      PASSWORD: ""
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3001/login').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
